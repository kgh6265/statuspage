sites:
  - name: Student Government website (sg.ritdubai.ae)
    url: https://sg.ritdubai.ae
  - name: RIT MUN website (mun.ritdubai.ae)
    url: https://mun.ritdubai.ae
    maxResponseTime: 90000
  - name: Graphic Design Club website (Vercel)
    url: $GDWEBSITE_RAW
  - name: Graphic Design Club DNS & Routing (gdclub.ritdubai.ae)
    url: https://gdclub.ritdubai.ae
  - name: Graphic Design Club admin panel instance (Render)
    url: $GDADMIN_RAW
    maxResponseTime: 90000
  - name: Graphic Design Club Admin Panel DNS & Routing
    url: https://admin.gdclub.ritdubai.ae
    maxResponseTime: 90000

status-website:
