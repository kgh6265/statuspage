  # cname: demo.upptime.js.org
  baseUrl: /statuspage
  # logoUrl: https://raw.githubusercontent.com/upptime/upptime.js.org/master/static/img/icon.svg
  name: "Khaleel's RIT Statuspage"
  introTitle: "Keep an eye on online services at RIT Dubai."
  introMessage: This is a status page which uses **real-time** data to keep track of essential web services at RIT Dubai, including the Student Government and club websites. Powered by Upptime.
  navbar:
    - title: Status
      href: /
    - title: Website
      href: https://sg.ritdubai.ae
  theme: dark

